<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recollect</title>
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/theme-default.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="page-header">
        <h1>Recollect</h1>
        <p>Search the web with SearXNG</p>
      </header>
      <main class="search-panel">
        <form id="search-form" class="search-form">
          <label for="query" class="sr-only">Search</label>
          <input id="query" name="q" type="search" placeholder="Enter search terms" autocomplete="off" />
          <button type="submit">Search</button>
        </form>
        <section id="results" class="results"></section>
      </main>
    </div>
    <script>
      const form = document.getElementById('search-form');
      const queryInput = document.getElementById('query');
      const resultsNode = document.getElementById('results');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const query = queryInput.value.trim();
        resultsNode.innerHTML = '';
        if (!query) {
          resultsNode.textContent = 'Please enter a search term.';
          return;
        }
        const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
        const data = await response.json();
        if (!response.ok || data.error) {
          resultsNode.innerHTML = `<div class="message">${data.error || 'Search failed'}</div>`;
          return;
        }
        if (!Array.isArray(data) || data.length === 0) {
          resultsNode.innerHTML = '<div class="message">No results found.</div>';
          return;
        }
        resultsNode.innerHTML = data
          .map(
            (item) => `
          <article class="result-card">
            <a class="result-title" href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title || item.url}</a>
            <div class="result-url">${item.url}</div>
            <p class="result-content">${item.content || 'No description available.'}</p>
          </article>
        `
          )
          .join('');
      });
    </script>
  </body>
</html>
