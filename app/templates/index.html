<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recollect</title>
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/theme-default.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="page-header">
        <h1>Recollect</h1>
        <p>Search the web with SearXNG</p>
      </header>
      <main class="search-panel">
        <form id="search-form" class="search-form">
          <label for="query" class="sr-only">Search</label>
          <input id="query" name="q" type="search" placeholder="Enter search terms" autocomplete="off" />
          <button type="submit">Search</button>
        </form>
        <section id="results" class="results"></section>
        <div id="results-sentinel" class="sentinel"></div>
      </main>
    </div>
    <script>
      const form = document.getElementById('search-form');
      const queryInput = document.getElementById('query');
      const resultsNode = document.getElementById('results');
      const sentinel = document.getElementById('results-sentinel');

      let currentQuery = '';
      let currentPage = 1;
      let loading = false;
      let hasMore = false;

      async function loadResults(page) {
        if (loading || !currentQuery || !hasMore && page > 1) {
          return;
        }
        loading = true;
        const response = await fetch(`/search?q=${encodeURIComponent(currentQuery)}&page=${page}`);
        const data = await response.json();
        if (!response.ok || data.error) {
          if (page === 1) {
            resultsNode.innerHTML = `<div class="message">${data.error || 'Search failed'}</div>`;
          }
          loading = false;
          hasMore = false;
          return;
        }
        if (!Array.isArray(data) || data.length === 0) {
          if (page === 1) {
            resultsNode.innerHTML = '<div class="message">No results found.</div>';
          }
          hasMore = false;
          loading = false;
          return;
        }
        if (page === 1) {
          resultsNode.innerHTML = '';
        }
        resultsNode.insertAdjacentHTML(
          'beforeend',
          data
            .map(
              (item) => `
          <article class="result-card">
            <a class="result-title" href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title || item.url}</a>
            <div class="result-url">${item.url}</div>
            <p class="result-content">${item.content || 'No description available.'}</p>
          </article>
        `
            )
            .join('')
        );
        hasMore = data.length > 0;
        currentPage = page;
        loading = false;
      }

      const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !loading && hasMore) {
          loadResults(currentPage + 1);
        }
      }, {
        rootMargin: '200px',
      });
      observer.observe(sentinel);

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        currentQuery = queryInput.value.trim();
        currentPage = 1;
        hasMore = true;
        resultsNode.innerHTML = '';
        if (!currentQuery) {
          resultsNode.textContent = 'Please enter a search term.';
          return;
        }
        await loadResults(1);
      });
    </script>
  </body>
</html>
