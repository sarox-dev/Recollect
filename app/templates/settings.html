<button id="settings-button" class="settings-button" type="button" aria-label="Open settings">⚙</button>
<div id="settings-overlay" class="settings-overlay" hidden aria-hidden="true">
  <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="settings-header">
      <h2 id="settings-title">Settings</h2>
      <button id="settings-close" class="settings-close" type="button" aria-label="Close settings">×</button>
    </div>
    <div id="settings-list" class="settings-list"></div>
    <div class="settings-actions">
      <button id="settings-save" type="button">Save</button>
    </div>
  </div>
</div>
