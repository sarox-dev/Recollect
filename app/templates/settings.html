<button id="settings-button" class="settings-button" type="button" aria-label="Open settings">⚙</button>
<div id="settings-overlay" class="settings-overlay" hidden aria-hidden="true">
  <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="settings-header">
      <div>
        <h2 id="settings-title">Settings</h2>
        <p class="settings-description">Configure search and application preferences.</p>
      </div>
      <button id="settings-close" class="settings-close" type="button" aria-label="Close settings">×</button>
    </div>
    <div class="settings-body">
      <aside class="settings-sidebar">
        <label class="sr-only" for="settings-search-input">Search settings</label>
        <input id="settings-search-input" class="settings-search" type="search" placeholder="Search settings" autocomplete="off" />
        <nav class="settings-category-nav" aria-label="Settings categories">
          <ul id="settings-categories" class="settings-category-list"></ul>
        </nav>
      </aside>
      <section class="settings-main">
        <div class="settings-section-header">
          <h3 id="settings-category-title">Search</h3>
          <p id="settings-category-description" class="settings-category-description">Choose which search engines to use and add a custom search provider.</p>
        </div>
        <div id="settings-list" class="settings-list"></div>
      </section>
    </div>
    <div class="settings-actions">
      <button id="settings-save" type="button">Save</button>
    </div>
  </div>
</div>
